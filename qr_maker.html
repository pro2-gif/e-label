<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단상자용 QR코드 생성기</title>
    <!-- QR 코드 생성을 위한 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <!-- 폰트 적용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f9fafb;
            color: #111827;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            color: #4b5563;
            margin-bottom: 24px;
            text-align: center;
            font-size: 15px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            width: 100%;
            max-width: 500px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
        }
        .qr-card {
            background-color: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 24px;
        }
        /* 단상자 인쇄 가이드라인 스타일 */
        .qr-wrapper {
            border: 2px dashed #9ca3af;
            padding: 16px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 16px;
        }
        canvas {
            display: block;
        }
        .download-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }
        .download-btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <h2>단상자 삽입용 e-라벨 QR 코드 생성기</h2>
    <p>아래 입력창에 실제로 e-라벨 화면이 서비스될 <strong>웹사이트 주소(URL)</strong>를 입력하시면, <br>인쇄용 고해상도 QR 코드가 실시간으로 생성됩니다.</p>
    
    <div class="input-group">
        <input type="text" id="url-input" value="https://intomedipro.com/e-label/reju" placeholder="https://..." />
    </div>

    <div class="qr-card">
        <div class="qr-wrapper">
            <canvas id="qr-canvas"></canvas>
        </div>
        <div>
            <button class="download-btn" onclick="downloadQR()">📥 QR 코드 이미지 다운로드 (.png)</button>
        </div>
    </div>

    <script>
        // QR 생성기 초기화 (H 레벨: 가장 높은 오류 복구율을 가져서 인쇄용 단상자에 적합함)
        const qr = new QRious({
            element: document.getElementById('qr-canvas'),
            value: document.getElementById('url-input').value,
            size: 300, 
            level: 'H' 
        });

        // 주소가 바뀔 때마다 QR 코드 실시간 업데이트
        document.getElementById('url-input').addEventListener('input', function(e) {
            qr.value = e.target.value;
        });

        // 다운로드 기능
        function downloadQR() {
            const canvas = document.getElementById('qr-canvas');
            // 캔버스 이미지를 PNG 데이터로 변환
            const imageUrl = canvas.toDataURL("image/png");
            
            // 가상의 링크를 만들어 클릭 이벤트를 발생시켜 다운로드 실행
            const link = document.createElement('a');
            link.download = '인투메디_단상자_QR코드.png';
            link.href = imageUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
