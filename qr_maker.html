<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인투메디 QR 코드 생성기 (관리자용)</title>
    <!-- Pretendard 고급 폰트 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- QR 코드 생성 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* QR 생성기 전용 추가 스타일 */
        body {
            padding-bottom: 40px;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4ff 0%, #fafafa 100%);
        }

        .qr-maker-wrapper {
            max-width: 520px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .qr-maker-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .qr-maker-header .brand-logo {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .qr-maker-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #111827;
            background: linear-gradient(135deg, #111827, #4b5563);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .qr-maker-header p {
            font-size: 14px;
            color: #6b7280;
            margin-top: 8px;
        }

        .qr-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .select-label {
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            align-self: flex-start;
        }

        .product-select-full {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            background-color: #f9fafb;
            color: #111827;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .product-select-full:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .qr-canvas-wrapper {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .qr-product-title {
            font-size: 17px;
            font-weight: 800;
            color: #111827;
            text-align: center;
            letter-spacing: -0.01em;
        }

        #qr-canvas {
            width: 260px;
            height: 260px;
            border-radius: 8px;
        }

        .qr-url-preview {
            font-size: 11px;
            color: #9ca3af;
            word-break: break-all;
            text-align: center;
            padding: 0 8px;
        }

        .btn-download {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }

        .btn-download:active {
            transform: translateY(0);
        }

        .loading-inline {
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>

<body>
    <div class="qr-maker-wrapper">
        <div class="qr-maker-header">
            <p class="brand-logo">인투메디 (INTOMEDI)</p>
            <h1> QR 코드 생성기</h1>
            <p>제품을 선택하면 QR 코드가 즉시 생성됩니다.</p>
        </div>

        <div class="qr-card">
            <label class="select-label" for="product-select-maker">제품 선택</label>
            <select id="product-select-maker" class="product-select-full">
                <option value="">-- 데이터 불러오는 중... --</option>
            </select>

            <div class="qr-canvas-wrapper">
                <div id="qr-product-title-display" class="qr-product-title">제품을 선택해 주세요</div>
                <canvas id="qr-canvas"></canvas>
                <div id="qr-url-preview" class="qr-url-preview"></div>
            </div>

            <button id="btn-download" class="btn-download">
                <span class="material-icons" style="font-size:20px;">download</span>
                QR 코드 이미지 다운로드 (.png)
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // qr_maker.html은 "메이커(maker)" 모드로 실행
        initQrMaker();
    </script>
</body>

</html>
